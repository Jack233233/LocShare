<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>位置共享</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- 主菜单 -->
        <div id="main-menu" class="page active">
            <h1 class="title">位置共享</h1>
            <div class="menu-buttons">
                <button class="btn-primary" onclick="enterPairMode()">
                    <span class="icon">👥</span>
                    <span class="text">好友共享</span>
                </button>
                <button class="btn-secondary" onclick="enterMultiMode()">
                    <span class="icon">👨‍👩‍👧‍👦</span>
                    <span class="text">多人共享</span>
                </button>
            </div>
        </div>

        <!-- 好友模式 -->
        <div id="pair-mode" class="page">
            <div class="header">
                <button class="btn-back" onclick="backToMenu()">← 返回</button>
                <h2>好友共享</h2>
            </div>

            <div class="content">
                <div class="input-group">
                    <input type="text" id="userName" placeholder="你的名字" maxlength="10">
                </div>

                <div class="action-buttons">
                    <button class="btn-action" onclick="generatePairCode()">生成配对码</button>
                    <button class="btn-action" onclick="showInputCode()">输入配对码</button>
                </div>

                <div id="pair-code-display" class="code-display hidden">
                    <div class="code">----</div>
                    <div class="hint">告诉对方输入此配对码添加你为好友</div>
                </div>

                <div class="friends-section">
                    <div class="section-header" onclick="toggleFriends()">
                        <span>好友列表</span>
                        <span id="friend-count">(0)</span>
                        <span id="expand-icon">▼</span>
                    </div>
                    <div id="friends-list" class="friends-list">
                        <!-- 好友列表动态生成 -->
                    </div>
                </div>

                <div class="share-controls">
                    <button id="btn-share" class="btn-share" onclick="toggleSharing()">开始共享</button>
                    <button id="btn-stop" class="btn-stop hidden" onclick="stopSharing()">停止共享</button>
                </div>
            </div>
        </div>

        <!-- 多人模式 -->
        <div id="multi-mode" class="page">
            <div class="header">
                <button class="btn-back" onclick="backToMenu()">← 返回</button>
                <h2>多人共享</h2>
            </div>

            <div class="content">
                <div class="input-group">
                    <input type="text" id="multiUserName" placeholder="你的名字" maxlength="10">
                </div>
                <div class="input-group">
                    <input type="text" id="roomId" placeholder="房间号" maxlength="20">
                </div>

                <div class="share-controls">
                    <button id="btn-multi-share" class="btn-share" onclick="startMultiSharing()">加入房间</button>
                    <button id="btn-multi-stop" class="btn-stop hidden" onclick="stopSharing()">退出房间</button>
                </div>
            </div>
        </div>

        <!-- 地图容器（浮动在底部） -->
        <div id="map-container" class="map-container hidden">
            <div class="map-controls">
                <button class="btn-map-control" onclick="toggleFollow()">
                    <span id="follow-icon">📍</span>
                </button>
            </div>
        </div>
    </div>

    <!-- 输入配对码弹窗 -->
    <div id="input-code-modal" class="modal hidden">
        <div class="modal-content">
            <h3>输入配对码</h3>
            <input type="number" id="input-code" placeholder="6位数字" maxlength="6">
            <div class="modal-buttons">
                <button onclick="hideModal()">取消</button>
                <button onclick="submitPairCode()">添加</button>
            </div>
        </div>
    </div>

    <!-- 状态提示 -->
    <div id="toast" class="toast hidden"></div>

    <script src="app.js"></script>
</body>
</html>
