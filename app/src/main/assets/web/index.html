<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Together</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: white;
            min-height: 500px;
        }
        .sheet-handle {
            padding: 12px;
            text-align: center;
            cursor: pointer;
            background: white;
            touch-action: pan-y;
        }
        .handle-bar {
            width: 36px;
            height: 4px;
            background: #E0E0E0;
            border-radius: 2px;
            margin: 0 auto 8px;
        }
        .quick-actions {
            display: flex;
            gap: 12px;
            padding: 12px 16px;
            overflow-x: auto;
        }
        /* жҠҪеұүжҠҳеҸ ж—¶пјҢзҰҒжӯўеҶ…йғЁе…ғзҙ ж»ҡеҠЁ */
        .sheet-collapsed .quick-actions,
        .sheet-collapsed .panel {
            pointer-events: none;
        }
        /* дҪҶжҢүй’®д»Қз„¶еҸҜд»ҘзӮ№еҮ» */
        .sheet-collapsed .action-chip,
        .sheet-collapsed .btn {
            pointer-events: auto;
        }
        .action-chip {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 12px 16px;
            border: none;
            border-radius: 12px;
            background: #FFF8F5;
            cursor: pointer;
            transition: transform 0.15s, background 0.15s;
        }
        .action-chip:active {
            transform: scale(0.92);
            background: #FFEDE5;
        }
        .chip-icon { font-size: 24px; }
        .chip-text { font-size: 12px; color: #666; }
        .panel { padding: 16px; }
        .panel-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #2C3E50;
        }
        .hidden { display: none; }
        .btn {
            width: 100%;
            padding: 16px;
            margin: 8px 0;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #FF8A65, #F48FB1);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn:active:not(:disabled) {
            transform: scale(0.96);
            box-shadow: 0 4px 12px rgba(255, 138, 101, 0.4);
        }
        .btn:disabled {
            background: #E0E0E0;
            cursor: not-allowed;
        }
        .input-group {
            margin: 12px 0;
        }
        .input-group input {
            width: 100%;
            padding: 14px;
            border: 1.5px solid #E8E8E8;
            border-radius: 12px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #FF8A65;
        }
        .friend-item {
            padding: 14px 16px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.15s;
        }
        .friend-item:active {
            background: #FFF5F2;
        }
        .friend-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4DB6AC, #80CBC4);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
        .friend-name {
            font-weight: 600;
            color: #2C3E50;
        }
        .friend-status {
            font-size: 12px;
            color: #999;
        }
        .friend-selected {
            background: #FFF5F2;
            border-left: 3px solid #FF8A65;
        }
    </style>
</head>
<body>
    <div class="sheet-handle" onclick="toggleSheet()">
        <div class="handle-bar"></div>
        <div id="hint">рҹ‘Ҷ дёҠж»‘еұ•ејҖ</div>
    </div>

    <div id="sheet-content">
        <div class="quick-actions">
            <button class="action-chip" onclick="showPair()">
                <span class="chip-icon">рҹ‘Ҙ</span>
                <span class="chip-text">еҘҪеҸӢ</span>
            </button>
            <button class="action-chip" onclick="showMulti()">
                <span class="chip-icon">рҹ‘ЁвҖҚрҹ‘©вҖҚрҹ‘§вҖҚрҹ‘Ұ</span>
                <span class="chip-text">еӨҡдәә</span>
            </button>
            <button class="action-chip" onclick="showRoutes()">
                <span class="chip-icon">рҹ—әпёҸ</span>
                <span class="chip-text">и·Ҝзәҝ</span>
            </button>
            <button class="action-chip" onclick="showProfile()">
                <span class="chip-icon">вҡҷпёҸ</span>
                <span class="chip-text">и®ҫзҪ®</span>
            </button>
        </div>

        <div id="pair-panel" class="panel">
            <div class="panel-title">еҘҪеҸӢе…ұдә«</div>
            <button class="btn" onclick="generateCode()">з”ҹжҲҗй…ҚеҜ№з Ғ</button>
            <button class="btn" onclick="showPairDialog()">иҫ“е…Ҙй…ҚеҜ№з Ғ</button>
            <div id="code-display" class="hidden" style="text-align: center; padding: 20px; background: #FFF5F2; border-radius: 12px; margin: 12px 0;">
                <div id="code" style="font-size: 32px; font-weight: bold; color: #FF8A65; letter-spacing: 8px;">------</div>
                <div style="font-size: 12px; color: #999; margin-top: 8px;">е‘ҠиҜүеҜ№ж–№иҫ“е…ҘжӯӨй…ҚеҜ№з Ғ</div>
            </div>
            <div id="friends-list" style="margin-top: 12px; border-top: 1px solid #f0f0f0;"></div>
        </div>

        <div id="multi-panel" class="panel hidden">
            <div class="panel-title">еӨҡдәәе…ұдә«</div>
            <div class="input-group">
                <input type="text" id="room-id" placeholder="жҲҝй—ҙеҸ·" oninput="updateBtn()">
            </div>
            <div class="input-group">
                <input type="text" id="user-name" placeholder="дҪ зҡ„еҗҚеӯ—">
            </div>
        </div>

        <div class="panel">
            <button class="btn" id="share-btn" onclick="toggleShare()" disabled>ејҖе§Ӣе…ұдә«</button>
        </div>
    </div>

    <script>
        let currentMode = 'none';
        let isSharing = false;
        let selectedFriend = null;
        let isExpanded = false;

        function toggleSheet() {
            if (window.AndroidBridge) {
                AndroidBridge.toggleSheet();
            }
        }

        window.onSheetState = function(state) {
            isExpanded = (state === 'expanded');
            document.getElementById('hint').textContent = isExpanded ? 'рҹ‘Ү дёӢж»‘ж”¶иө·' : 'рҹ‘Ҷ дёҠж»‘еұ•ејҖ';

            // ж №жҚ®еұ•ејҖзҠ¶жҖҒи®ҫзҪ®ж ·ејҸ
            const body = document.body;
            if (isExpanded) {
                body.classList.remove('sheet-collapsed');
            } else {
                body.classList.add('sheet-collapsed');
            }
        };

        function showPair() {
            currentMode = 'pair';
            document.getElementById('pair-panel').classList.remove('hidden');
            document.getElementById('multi-panel').classList.add('hidden');
            updateBtn();
            loadFriends();
        }

        function showMulti() {
            currentMode = 'multi';
            document.getElementById('pair-panel').classList.add('hidden');
            document.getElementById('multi-panel').classList.remove('hidden');
            updateBtn();
        }

        function showRoutes() {
            if (window.AndroidBridge) AndroidBridge.showRouteManager();
        }

        function showProfile() {
            if (window.AndroidBridge) AndroidBridge.showProfile();
        }

        function generateCode() {
            if (window.AndroidBridge) AndroidBridge.generatePairCode('');
        }

        window.onPairCode = function(code) {
            document.getElementById('code').textContent = code;
            document.getElementById('code-display').classList.remove('hidden');
        };

        function showPairDialog() {
            const code = prompt('иҫ“е…Ҙ6дҪҚй…ҚеҜ№з Ғ');
            if (code && code.length === 6 && window.AndroidBridge) {
                AndroidBridge.pairWithCode(code, '');
            }
        }

        function loadFriends() {
            if (window.AndroidBridge) AndroidBridge.loadFriends();
        }

        window.onFriends = function(json) {
            const friends = JSON.parse(json);
            const list = document.getElementById('friends-list');
            if (friends.length === 0) {
                list.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">жҡӮж— еҘҪеҸӢпјҢзӮ№еҮ»"з”ҹжҲҗй…ҚеҜ№з Ғ"ж·»еҠ </div>';
            } else {
                list.innerHTML = friends.map(f => `
                    <div class="friend-item ${selectedFriend?.friendId === f.friendId ? 'friend-selected' : ''}" onclick="selectFriend('${f.friendId}', '${f.pairRoomId}', '${f.friendName}')">
                        <div class="friend-avatar">${f.friendName.charAt(0)}</div>
                        <div>
                            <div class="friend-name">${f.friendName}</div>
                            <div class="friend-status">зӮ№еҮ»ејҖе§Ӣе…ұдә«</div>
                        </div>
                    </div>
                `).join('');
            }
        };

        function selectFriend(id, roomId, name) {
            selectedFriend = { friendId: id, pairRoomId: roomId, friendName: name };
            // жӣҙж–°йҖүдёӯж ·ејҸ
            document.querySelectorAll('.friend-item').forEach(el => {
                el.classList.remove('friend-selected');
            });
            event.currentTarget.classList.add('friend-selected');
            updateBtn();
        }

        function toggleShare() {
            if (isSharing) {
                if (window.AndroidBridge) AndroidBridge.stopSharing();
            } else {
                const name = document.getElementById('user-name')?.value || '';
                if (currentMode === 'pair' && selectedFriend) {
                    if (window.AndroidBridge) AndroidBridge.startPairSharing(name, selectedFriend.pairRoomId);
                } else if (currentMode === 'multi') {
                    const roomId = document.getElementById('room-id').value;
                    if (roomId && window.AndroidBridge) AndroidBridge.startMultiSharing(name, roomId);
                }
            }
        }

        function updateBtn() {
            const btn = document.getElementById('share-btn');
            btn.textContent = isSharing ? 'еҒңжӯўе…ұдә«' : 'ејҖе§Ӣе…ұдә«';
            btn.style.background = isSharing ? '#FF6B6B' : '';

            let canStart = false;
            if (currentMode === 'pair' && selectedFriend) canStart = true;
            if (currentMode === 'multi' && document.getElementById('room-id')?.value) canStart = true;

            btn.disabled = !isSharing && !canStart;
        }

        window.onShareState = function(sharing) {
            isSharing = sharing;
            updateBtn();
        };

        window.onUserJoin = function(name) {
            // еҸҜд»ҘжҳҫзӨәtoastжҸҗзӨә
        };

        window.onNewFriend = function(name) {
            loadFriends();
        };
    </script>
</body>
</html>
