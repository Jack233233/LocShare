<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Together</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { background: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: white;
            min-height: 350px;
            border-radius: 24px 24px 0 0;
            box-shadow: 0 -4px 32px rgba(0, 0, 0, 0.15);
        }
        .sheet-handle {
            padding: 16px 12px 12px;
            text-align: center;
            cursor: pointer;
            background: white;
            touch-action: pan-y;
            border-radius: 24px 24px 0 0;
        }
        .handle-bar {
            width: 36px;
            height: 4px;
            background: #E0E0E0;
            border-radius: 2px;
            margin: 0 auto 8px;
        }
        .quick-actions {
            display: flex;
            gap: 12px;
            padding: 12px 16px;
            overflow-x: auto;
        }
        #sheet-content {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .action-chip {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 12px 16px;
            border: none;
            border-radius: 12px;
            background: #FFF8F5;
            cursor: pointer;
            transition: transform 0.15s, background 0.15s;
        }
        .action-chip:active { transform: scale(0.92); background: #FFEDE5; }
        .chip-icon { font-size: 24px; }
        .chip-text { font-size: 12px; color: #666; }
        .panel { padding: 16px; }
        .panel-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #2C3E50;
        }
        .hidden { display: none; }
        .btn {
            width: 100%;
            padding: 16px;
            margin: 8px 0;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #FF8A65, #F48FB1);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn:active:not(:disabled) { transform: scale(0.96); box-shadow: 0 4px 12px rgba(255, 138, 101, 0.4); }
        .btn:disabled { background: #E0E0E0; cursor: not-allowed; }
        .btn.stopping { background: linear-gradient(135deg, #FF6B6B, #FF8E8E); }
        .input-group { margin: 12px 0; }
        .input-group input {
            width: 100%;
            padding: 14px;
            border: 1.5px solid #E8E8E8;
            border-radius: 12px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .input-group input:focus { outline: none; border-color: #FF8A65; }
        .friend-item {
            padding: 14px 16px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.15s;
        }
        .friend-item:active { background: #FFF5F2; }
        .friend-selected { background: #FFF5F2; border-left: 3px solid #FF8A65; }
        .friend-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4DB6AC, #80CBC4);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
        .friend-name { font-weight: 600; color: #2C3E50; }
        .friend-status { font-size: 12px; color: #999; }
        /* 地图信息窗口 */
        .map-info-window {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: white;
            border-radius: 16px;
            padding: 20px;
            min-width: 200px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s ease-out;
        }
        .map-info-window.show {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }
        .info-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .info-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4DB6AC, #80CBC4);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: 600;
        }
        .info-name { font-size: 18px; font-weight: 700; color: #2C3E50; }
        .info-status { font-size: 12px; color: #999; margin-top: 2px; }
        .info-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-item { background: #F8F9FA; border-radius: 12px; padding: 12px; text-align: center; }
        .stat-value { font-size: 20px; font-weight: 700; color: #FF8A65; margin-bottom: 4px; }
        .stat-label { font-size: 11px; color: #999; }
        .info-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 50%;
            background: #F0F0F0;
            color: #666;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .info-close:active { background: #E0E0E0; }
        .info-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .info-backdrop.show { opacity: 1; pointer-events: auto; }
        /* 房间用户列表 */
        .room-users { margin-top: 16px; border-top: 1px solid #f0f0f0; padding-top: 16px; }
        .room-users-title { font-size: 14px; font-weight: 600; color: #666; margin-bottom: 12px; }
        .room-user-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 8px;
            background: #F8F9FA;
            cursor: pointer;
            transition: background 0.15s;
        }
        .room-user-item:active { background: #FFF5F2; }
        .room-user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF8A65, #F48FB1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            margin-right: 12px;
        }
        .room-user-name { flex: 1; font-size: 14px; color: #2C3E50; }
        /* 切换面板遮罩 */
        .mode-switch-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .mode-switch-overlay.show { opacity: 1; pointer-events: auto; }
        .mode-switch-dialog {
            background: white;
            border-radius: 16px;
            padding: 24px;
            width: 80%;
            max-width: 300px;
            text-align: center;
        }
        .mode-switch-dialog h3 {
            font-size: 16px;
            font-weight: 700;
            color: #2C3E50;
            margin-bottom: 12px;
        }
        .mode-switch-dialog p {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }
        .mode-switch-dialog .btn-group {
            display: flex;
            gap: 12px;
        }
        .btn-secondary {
            flex: 1;
            padding: 12px;
            border: 1px solid #E0E0E0;
            border-radius: 12px;
            background: white;
            color: #666;
            font-size: 14px;
            cursor: pointer;
        }
        .btn-primary {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #FF8A65, #F48FB1);
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- 地图信息窗口 -->
    <div class="info-backdrop" id="info-backdrop" onclick="closeInfoWindow()"></div>
    <div class="map-info-window" id="map-info-window">
        <button class="info-close" onclick="closeInfoWindow()">✕</button>
        <div class="info-header">
            <div class="info-avatar" id="info-avatar">?</div>
            <div>
                <div class="info-name" id="info-name">未知用户</div>
                <div class="info-status">点击查看详情</div>
            </div>
        </div>
        <div class="info-stats">
            <div class="stat-item">
                <div class="stat-value" id="info-speed">0</div>
                <div class="stat-label">km/h</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="info-bearing">北</div>
                <div class="stat-label">方向</div>
            </div>
        </div>
    </div>

    <!-- 切换面板确认对话框 -->
    <div class="mode-switch-overlay" id="mode-switch-overlay">
        <div class="mode-switch-dialog">
            <h3>正在共享位置</h3>
            <p>切换模式需要先停止当前共享，是否停止？</p>
            <div class="btn-group">
                <button class="btn-secondary" onclick="hideModeSwitchDialog()">取消</button>
                <button class="btn-primary" onclick="confirmStopAndSwitch()">停止并切换</button>
            </div>
        </div>
    </div>

    <div class="sheet-handle" onclick="toggleSheet()">
        <div class="handle-bar"></div>
        <div id="hint">👆 点击展开</div>
    </div>

    <div id="sheet-content">
        <div class="quick-actions">
            <button class="action-chip" onclick="trySwitchMode('pair')">
                <span class="chip-icon">👥</span>
                <span class="chip-text">好友</span>
            </button>
            <button class="action-chip" onclick="trySwitchMode('multi')">
                <span class="chip-icon">👨‍👩‍👧‍👦</span>
                <span class="chip-text">多人</span>
            </button>
            <button class="action-chip" onclick="showRoutes()">
                <span class="chip-icon">🗺️</span>
                <span class="chip-text">路线</span>
            </button>
            <button class="action-chip" onclick="showProfile()">
                <span class="chip-icon">⚙️</span>
                <span class="chip-text">设置</span>
            </button>
        </div>

        <!-- 好友面板 -->
        <div id="pair-panel" class="panel">
            <div class="panel-title">好友共享</div>
            <button class="btn" onclick="generateCode()">生成配对码</button>
            <button class="btn" onclick="showPairDialog()">输入配对码</button>
            <div id="code-display" class="hidden" style="text-align: center; padding: 16px; background: #FFF5F2; border-radius: 12px; margin: 12px 0;">
                <div id="code" style="font-size: 32px; font-weight: bold; color: #FF8A65; letter-spacing: 8px;">------</div>
                <div style="font-size: 12px; color: #999; margin-top: 4px;">告诉对方输入此配对码</div>
                <div style="font-size: 11px; color: #FF8A65; margin-top: 4px;" id="code-timer">5分钟后失效</div>
                <button onclick="hidePairCode()" style="margin-top: 12px; padding: 8px 24px; border: 1px solid #FF8A65; border-radius: 16px; background: white; color: #FF8A65; font-size: 13px; cursor: pointer;">取消</button>
            </div>
            <div id="friends-list" style="margin-top: 12px; border-top: 1px solid #f0f0f0;"></div>
            <button class="btn" id="pair-share-btn" onclick="togglePairShare()" disabled>开始共享</button>
        </div>

        <!-- 路线模式面板 -->
        <div id="route-panel" class="panel hidden">
            <div class="panel-title">路线出行</div>
            <div id="route-info" style="background: #FFF5F2; border-radius: 12px; padding: 16px; margin-bottom: 12px;">
                <div style="font-size: 16px; font-weight: 700; color: #2C3E50; margin-bottom: 8px;" id="route-name">--</div>
                <div style="font-size: 13px; color: #666;">终点: <span id="route-end">--</span></div>
                <div style="margin-top: 12px; display: flex; gap: 16px;">
                    <div>
                        <div style="font-size: 24px; font-weight: 700; color: #FF8A65;" id="route-distance">--</div>
                        <div style="font-size: 11px; color: #999;">剩余距离(米)</div>
                    </div>
                    <div>
                        <div style="font-size: 24px; font-weight: 700; color: #4DB6AC;" id="route-duration">--</div>
                        <div style="font-size: 11px; color: #999;">已用时</div>
                    </div>
                </div>
            </div>
            <div id="route-nearby" class="hidden" style="background: #E8F5E9; border-radius: 12px; padding: 12px 16px; margin-bottom: 12px;">
                <div style="font-size: 14px; color: #4CAF50; font-weight: 600;">🎉 即将到达终点!</div>
            </div>
            <button class="btn stopping" onclick="stopRouteSharing()">停止出行</button>
        </div>

        <!-- 多人面板 -->
        <div id="multi-panel" class="panel hidden">
            <div class="panel-title">多人共享</div>
            <div class="input-group">
                <input type="text" id="room-id" placeholder="房间号" oninput="updateMultiBtn()">
            </div>
            <div class="input-group">
                <input type="text" id="user-name" placeholder="你的名字" oninput="updateMultiBtn()">
            </div>
            <div id="room-users-list" class="room-users hidden">
                <div class="room-users-title">房间成员</div>
                <div id="room-users-container"></div>
            </div>
            <button class="btn" id="multi-share-btn" onclick="toggleMultiShare()" disabled>开始共享</button>
        </div>
    </div>

    <script>
        // 全局状态
        let currentMode = 'none'; // 'pair' | 'multi' | 'none'
        let isSharing = false;
        let selectedFriend = null;
        let isExpanded = false;
        let roomUsers = new Map();
        let pendingMode = null;

        // ========== 抽屉控制 ==========
        function toggleSheet() {
            if (window.AndroidBridge) AndroidBridge.toggleSheet();
        }

        window.onSheetState = function(state) {
            isExpanded = (state === 'expanded');
            document.getElementById('hint').textContent = isExpanded ? '👇 点击收起' : '👆 点击展开';
        };

        // ========== 模式切换（带停止确认） ==========
        function trySwitchMode(mode) {
            if (isSharing && currentMode !== mode) {
                // 正在共享，需要确认停止
                pendingMode = mode;
                showModeSwitchDialog();
                return;
            }
            // 未共享或切换到相同模式，直接切换
            switchToMode(mode);
        }

        function switchToMode(mode) {
            currentMode = mode;
            if (mode === 'pair') {
                document.getElementById('pair-panel').classList.remove('hidden');
                document.getElementById('multi-panel').classList.add('hidden');
                loadFriends();
            } else if (mode === 'multi') {
                document.getElementById('pair-panel').classList.add('hidden');
                document.getElementById('multi-panel').classList.remove('hidden');
            }
        }

        function showModeSwitchDialog() {
            document.getElementById('mode-switch-overlay').classList.add('show');
        }

        function hideModeSwitchDialog() {
            document.getElementById('mode-switch-overlay').classList.remove('show');
            pendingMode = null;
        }

        function confirmStopAndSwitch() {
            // 停止共享
            if (window.AndroidBridge) AndroidBridge.stopSharing();
            hideModeSwitchDialog();
            // 等待停止完成后再切换
            setTimeout(() => {
                if (pendingMode) {
                    switchToMode(pendingMode);
                    pendingMode = null;
                }
            }, 300);
        }

        // ========== 好友模式 ==========
        function generateCode() {
            if (window.AndroidBridge) AndroidBridge.generatePairCode('');
        }

        function showPairDialog() {
            const code = prompt('输入6位配对码');
            if (code && code.length === 6 && window.AndroidBridge) {
                AndroidBridge.pairWithCode(code, '');
            }
        }

        function loadFriends() {
            if (window.AndroidBridge) AndroidBridge.loadFriends();
        }

        window.onFriends = function(json) {
            const friends = JSON.parse(json);
            const list = document.getElementById('friends-list');
            if (friends.length === 0) {
                list.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">暂无好友，点击"生成配对码"添加</div>';
            } else {
                list.innerHTML = friends.map(f => `
                    <div class="friend-item ${selectedFriend?.friendId === f.friendId ? 'friend-selected' : ''}" onclick="selectFriend('${f.friendId}', '${f.pairRoomId}', '${f.friendName}')">
                        <div class="friend-avatar">${f.friendName.charAt(0)}</div>
                        <div>
                            <div class="friend-name">${f.friendName}</div>
                            <div class="friend-status">点击开始共享</div>
                        </div>
                    </div>
                `).join('');
            }
            updatePairBtn();
        };

        function selectFriend(id, roomId, name) {
            selectedFriend = { friendId: id, pairRoomId: roomId, friendName: name };
            document.querySelectorAll('.friend-item').forEach(el => el.classList.remove('friend-selected'));
            event.currentTarget.classList.add('friend-selected');
            updatePairBtn();
        }

        let pairCodeTimer = null;
        let pairCodeExpireTime = null;

        window.onPairCode = function(code) {
            document.getElementById('code').textContent = code;
            document.getElementById('code-display').classList.remove('hidden');

            // 设置5分钟后自动隐藏
            pairCodeExpireTime = Date.now() + 5 * 60 * 1000;

            if (pairCodeTimer) clearInterval(pairCodeTimer);
            pairCodeTimer = setInterval(() => {
                const remaining = pairCodeExpireTime - Date.now();
                if (remaining <= 0) {
                    hidePairCode();
                } else {
                    const minutes = Math.ceil(remaining / 60000);
                    document.getElementById('code-timer').textContent = `${minutes}分钟后失效`;
                }
            }, 10000); // 每10秒更新一次
        };

        function hidePairCode() {
            document.getElementById('code-display').classList.add('hidden');
            document.getElementById('code').textContent = '------';
            if (pairCodeTimer) {
                clearInterval(pairCodeTimer);
                pairCodeTimer = null;
            }
            pairCodeExpireTime = null;
        }

        window.onNewFriend = function(name) {
            loadFriends();
            // 添加好友后自动隐藏配对码
            hidePairCode();
        };

        function updatePairBtn() {
            const btn = document.getElementById('pair-share-btn');
            btn.textContent = isSharing && currentMode === 'pair' ? '停止共享' : '开始共享';
            btn.classList.toggle('stopping', isSharing && currentMode === 'pair');
            btn.disabled = !isSharing && !selectedFriend;
        }

        function togglePairShare() {
            if (isSharing) {
                if (window.AndroidBridge) AndroidBridge.stopSharing();
            } else if (selectedFriend) {
                if (window.AndroidBridge) {
                    const info = JSON.parse(AndroidBridge.getUserInfo());
                    const userName = info.userName || '';
                    AndroidBridge.startPairSharing(userName, selectedFriend.pairRoomId);
                }
            }
        }

        // ========== 多人模式 ==========
        function updateMultiBtn() {
            const roomId = document.getElementById('room-id').value;
            const userName = document.getElementById('user-name').value;
            const btn = document.getElementById('multi-share-btn');

            btn.textContent = isSharing && currentMode === 'multi' ? '停止共享' : '开始共享';
            btn.classList.toggle('stopping', isSharing && currentMode === 'multi');
            btn.disabled = !isSharing && !(roomId && userName);
        }

        function toggleMultiShare() {
            if (isSharing) {
                if (window.AndroidBridge) AndroidBridge.stopSharing();
            } else {
                const roomId = document.getElementById('room-id').value;
                const userName = document.getElementById('user-name').value;
                if (roomId && userName && window.AndroidBridge) {
                    AndroidBridge.startMultiSharing(userName, roomId);
                }
            }
        }

        // ========== 共享状态回调 ==========
        window.onShareState = function(sharing) {
            isSharing = sharing;
            updatePairBtn();
            updateMultiBtn();
            if (!isSharing) {
                // 停止共享后清空房间用户列表
                roomUsers.clear();
                updateRoomUsersList();
            }
        };

        // ========== 房间用户列表 ==========
        window.onLocationUpdate = function(userId, lat, lng, name, speed, bearing) {
            roomUsers.set(userId, {
                userId: userId,
                name: name,
                lat: lat,
                lng: lng,
                speed: speed || 0,
                bearing: bearing || 0
            });
            if (currentMode === 'multi' && isSharing) {
                updateRoomUsersList();
            }
            // 如果信息窗口打开且是该用户，实时更新速度和方向
            if (currentInfoWindowUserId === userId) {
                window.updateInfoWindowIfOpen(userId, name, speed || 0, bearing || 0);
            }
        };

        function updateRoomUsersList() {
            const container = document.getElementById('room-users-container');
            const listWrapper = document.getElementById('room-users-list');
            if (roomUsers.size === 0) {
                listWrapper.classList.add('hidden');
                return;
            }
            listWrapper.classList.remove('hidden');
            let html = '';
            roomUsers.forEach((user, uid) => {
                html += `
                    <div class="room-user-item" onclick="onRoomUserClick('${uid}')">
                        <div class="room-user-avatar">${user.name.charAt(0)}</div>
                        <div class="room-user-name">${user.name}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // 当前信息窗口显示的用户ID
        let currentInfoWindowUserId = null;

        function onRoomUserClick(userId) {
            const user = roomUsers.get(userId);
            if (!user) return;
            if (window.AndroidBridge) AndroidBridge.moveToLocation(user.lat, user.lng);
            currentInfoWindowUserId = userId;
            showInfoWindow(user.name, user.speed, user.bearing);
        }

        // 关闭信息窗口时清除当前用户ID
        const originalCloseInfoWindow = closeInfoWindow;
        closeInfoWindow = function() {
            currentInfoWindowUserId = null;
            originalCloseInfoWindow();
        }

        window.onUserLeave = function(userId) {
            roomUsers.delete(userId);
            if (currentMode === 'multi' && isSharing) {
                updateRoomUsersList();
            }
        };

        window.onUserJoin = function(name) {
            // 可以显示toast提示
        };

        // ========== 地图信息窗口 ==========
        window.onMarkerClicked = function(id, name, speed, bearing) {
            // id 可能是 'friend'（好友共享模式）或 userId（多人模式）
            currentInfoWindowUserId = id === 'friend' ? '__friend__' : id;
            showInfoWindow(name, speed, bearing);
        };

        function showInfoWindow(name, speed, bearing) {
            document.getElementById('info-avatar').textContent = name.charAt(0);
            document.getElementById('info-name').textContent = name;
            document.getElementById('info-speed').textContent = Math.round(speed * 3.6);
            const directions = ['北', '东北', '东', '东南', '南', '西南', '西', '西北'];
            document.getElementById('info-bearing').textContent = directions[Math.round(bearing / 45) % 8] || '北';
            document.getElementById('info-backdrop').classList.add('show');
            document.getElementById('map-info-window').classList.add('show');
        }

        function closeInfoWindow() {
            document.getElementById('info-backdrop').classList.remove('show');
            document.getElementById('map-info-window').classList.remove('show');
        }

        // 实时更新信息窗口（如果打开）
        // userId: 多人模式为实际userId，好友模式为 '__friend__'
        window.updateInfoWindowIfOpen = function(userId, name, speed, bearing) {
            // 检查是否是当前显示的用户
            if (currentInfoWindowUserId !== userId) return;

            const infoWindow = document.getElementById('map-info-window');
            // 只有当信息窗口显示时才更新
            if (infoWindow.classList.contains('show')) {
                document.getElementById('info-speed').textContent = Math.round(speed * 3.6);
                const directions = ['北', '东北', '东', '东南', '南', '西南', '西', '西北'];
                document.getElementById('info-bearing').textContent = directions[Math.round(bearing / 45) % 8] || '北';
            }
        };

        // ========== 其他功能 ==========
        function showRoutes() {
            if (window.AndroidBridge) AndroidBridge.showRouteManager();
        }

        function showProfile() {
            if (window.AndroidBridge) AndroidBridge.showProfile();
        }

        // ========== 路线模式 ==========
        let routeStartTime = null;
        let routeTimer = null;

        window.onRouteModeStarted = function(routeName, endName) {
            // 切换到路线面板
            document.getElementById('pair-panel').classList.add('hidden');
            document.getElementById('multi-panel').classList.add('hidden');
            document.getElementById('route-panel').classList.remove('hidden');

            // 设置路线信息
            document.getElementById('route-name').textContent = routeName;
            document.getElementById('route-end').textContent = endName;
            document.getElementById('route-distance').textContent = '--';
            document.getElementById('route-duration').textContent = '00:00';
            document.getElementById('route-nearby').classList.add('hidden');

            // 开始计时
            routeStartTime = Date.now();
            if (routeTimer) clearInterval(routeTimer);
            routeTimer = setInterval(updateRouteDuration, 1000);

            // 展开面板显示信息
            if (window.AndroidBridge) AndroidBridge.toggleSheet();
        };

        function updateRouteDuration() {
            if (!routeStartTime) return;
            const elapsed = Math.floor((Date.now() - routeStartTime) / 1000);
            const minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
            const seconds = (elapsed % 60).toString().padStart(2, '0');
            document.getElementById('route-duration').textContent = `${minutes}:${seconds}`;
        }

        window.onRouteProgress = function(distance, endLat, endLng) {
            // 更新剩余距离
            document.getElementById('route-distance').textContent = Math.round(distance);
        };

        window.onNearDestination = function() {
            // 显示即将到达提示
            document.getElementById('route-nearby').classList.remove('hidden');
        };

        function stopRouteSharing() {
            if (window.AndroidBridge) AndroidBridge.stopSharing();
        }

        // 重写停止共享回调，处理路线模式
        const originalOnShareState = window.onShareState;
        window.onShareState = function(sharing) {
            originalOnShareState(sharing);

            if (!sharing && routeStartTime) {
                // 停止计时
                if (routeTimer) {
                    clearInterval(routeTimer);
                    routeTimer = null;
                }
                routeStartTime = null;

                // 切换回好友面板
                document.getElementById('route-panel').classList.add('hidden');
                switchToMode('pair');
            }
        };

        // 默认显示好友面板
        switchToMode('pair');
    </script>
</body>
</html>
