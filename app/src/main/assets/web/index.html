<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Together</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { background: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: white;
            min-height: 500px;
            border-radius: 24px 24px 0 0;
            box-shadow: 0 -4px 32px rgba(0, 0, 0, 0.15);
        }
        .sheet-handle {
            padding: 16px 12px 12px;
            text-align: center;
            cursor: pointer;
            background: white;
            touch-action: pan-y;
            border-radius: 24px 24px 0 0;
        }
        .handle-bar {
            width: 36px;
            height: 4px;
            background: #E0E0E0;
            border-radius: 2px;
            margin: 0 auto 8px;
        }
        .quick-actions {
            display: flex;
            gap: 12px;
            padding: 12px 16px;
            overflow-x: auto;
        }
        /* 抽屉折叠时，禁止内部元素滚动 */
        .sheet-collapsed .quick-actions,
        .sheet-collapsed .panel {
            pointer-events: none;
        }
        /* 但按钮仍然可以点击 */
        .sheet-collapsed .action-chip,
        .sheet-collapsed .btn {
            pointer-events: auto;
        }
        .action-chip {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 12px 16px;
            border: none;
            border-radius: 12px;
            background: #FFF8F5;
            cursor: pointer;
            transition: transform 0.15s, background 0.15s;
        }
        .action-chip:active {
            transform: scale(0.92);
            background: #FFEDE5;
        }
        .chip-icon { font-size: 24px; }
        .chip-text { font-size: 12px; color: #666; }
        .panel { padding: 16px; }
        .panel-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #2C3E50;
        }
        .hidden { display: none; }
        .btn {
            width: 100%;
            padding: 16px;
            margin: 8px 0;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #FF8A65, #F48FB1);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn:active:not(:disabled) {
            transform: scale(0.96);
            box-shadow: 0 4px 12px rgba(255, 138, 101, 0.4);
        }
        .btn:disabled {
            background: #E0E0E0;
            cursor: not-allowed;
        }
        .input-group {
            margin: 12px 0;
        }
        .input-group input {
            width: 100%;
            padding: 14px;
            border: 1.5px solid #E8E8E8;
            border-radius: 12px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #FF8A65;
        }
        .friend-item {
            padding: 14px 16px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.15s;
        }
        .friend-item:active {
            background: #FFF5F2;
        }
        .friend-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4DB6AC, #80CBC4);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
        .friend-name {
            font-weight: 600;
            color: #2C3E50;
        }
        .friend-status {
            font-size: 12px;
            color: #999;
        }
        .friend-selected {
            background: #FFF5F2;
            border-left: 3px solid #FF8A65;
        }
        /* 地图信息窗口 */
        .map-info-window {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: white;
            border-radius: 16px;
            padding: 20px;
            min-width: 200px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s ease-out;
        }
        .map-info-window.show {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }
        .info-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .info-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4DB6AC, #80CBC4);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: 600;
        }
        .info-name {
            font-size: 18px;
            font-weight: 700;
            color: #2C3E50;
        }
        .info-status {
            font-size: 12px;
            color: #999;
            margin-top: 2px;
        }
        .info-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .stat-item {
            background: #F8F9FA;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }
        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #FF8A65;
            margin-bottom: 4px;
        }
        .stat-label {
            font-size: 11px;
            color: #999;
        }
        .info-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 50%;
            background: #F0F0F0;
            color: #666;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .info-close:active {
            background: #E0E0E0;
        }
        .info-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .info-backdrop.show {
            opacity: 1;
            pointer-events: auto;
        }
        /* 房间用户列表 */
        .room-users {
            margin-top: 16px;
            border-top: 1px solid #f0f0f0;
            padding-top: 16px;
        }
        .room-users-title {
            font-size: 14px;
            font-weight: 600;
            color: #666;
            margin-bottom: 12px;
        }
        .room-user-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 8px;
            background: #F8F9FA;
            cursor: pointer;
            transition: background 0.15s;
        }
        .room-user-item:active {
            background: #FFF5F2;
        }
        .room-user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF8A65, #F48FB1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            margin-right: 12px;
        }
        .room-user-name {
            flex: 1;
            font-size: 14px;
            color: #2C3E50;
        }
        .room-user-self {
            font-size: 11px;
            color: #FF8A65;
            background: #FFF5F2;
            padding: 2px 8px;
            border-radius: 10px;
        }
        }
    </style>
</head>
<body>
    <!-- 地图信息窗口 -->
    <div class="info-backdrop" id="info-backdrop" onclick="closeInfoWindow()"></div>
    <div class="map-info-window" id="map-info-window">
        <button class="info-close" onclick="closeInfoWindow()">✕</button>
        <div class="info-header">
            <div class="info-avatar" id="info-avatar">?</div>
            <div>
                <div class="info-name" id="info-name">未知用户</div>
                <div class="info-status">点击查看详情</div>
            </div>
        </div>
        <div class="info-stats">
            <div class="stat-item">
                <div class="stat-value" id="info-speed">0</div>
                <div class="stat-label">km/h</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="info-bearing">北</div>
                <div class="stat-label">方向</div>
            </div>
        </div>
    </div>

    <div class="sheet-handle" onclick="toggleSheet()">
        <div class="handle-bar"></div>
        <div id="hint">👆 上滑展开</div>
    </div>

    <div id="sheet-content">
        <div class="quick-actions">
            <button class="action-chip" onclick="showPair()">
                <span class="chip-icon">👥</span>
                <span class="chip-text">好友</span>
            </button>
            <button class="action-chip" onclick="showMulti()">
                <span class="chip-icon">👨‍👩‍👧‍👦</span>
                <span class="chip-text">多人</span>
            </button>
            <button class="action-chip" onclick="showRoutes()">
                <span class="chip-icon">🗺️</span>
                <span class="chip-text">路线</span>
            </button>
            <button class="action-chip" onclick="showProfile()">
                <span class="chip-icon">⚙️</span>
                <span class="chip-text">设置</span>
            </button>
        </div>

        <div id="pair-panel" class="panel">
            <div class="panel-title">好友共享</div>
            <button class="btn" onclick="generateCode()">生成配对码</button>
            <button class="btn" onclick="showPairDialog()">输入配对码</button>
            <div id="code-display" class="hidden" style="text-align: center; padding: 20px; background: #FFF5F2; border-radius: 12px; margin: 12px 0;">
                <div id="code" style="font-size: 32px; font-weight: bold; color: #FF8A65; letter-spacing: 8px;">------</div>
                <div style="font-size: 12px; color: #999; margin-top: 8px;">告诉对方输入此配对码</div>
            </div>
            <div id="friends-list" style="margin-top: 12px; border-top: 1px solid #f0f0f0;"></div>
        </div>

        <div id="multi-panel" class="panel hidden">
            <div class="panel-title">多人共享</div>
            <div class="input-group">
                <input type="text" id="room-id" placeholder="房间号" oninput="updateBtn()">
            </div>
            <div class="input-group">
                <input type="text" id="user-name" placeholder="你的名字" oninput="updateBtn()">
            </div>
            <div id="room-users-list" class="room-users hidden">
                <div class="room-users-title">房间成员</div>
                <div id="room-users-container"></div>
            </div>
        </div>

        <div class="panel">
            <button class="btn" id="share-btn" onclick="toggleShare()" disabled>开始共享</button>
        </div>
    </div>

    <script>
        let currentMode = 'none';
        let isSharing = false;
        let selectedFriend = null;
        let isExpanded = false;
        let roomUsers = new Map(); // 存储房间内用户信息 {userId: {name, lat, lng, speed, bearing}}

        function toggleSheet() {
            if (window.AndroidBridge) {
                AndroidBridge.toggleSheet();
            }
        }

        window.onSheetState = function(state) {
            isExpanded = (state === 'expanded');
            document.getElementById('hint').textContent = isExpanded ? '👇 下滑收起' : '👆 上滑展开';

            // 根据展开状态设置样式
            const body = document.body;
            if (isExpanded) {
                body.classList.remove('sheet-collapsed');
            } else {
                body.classList.add('sheet-collapsed');
            }
        };

        function showPair() {
            currentMode = 'pair';
            document.getElementById('pair-panel').classList.remove('hidden');
            document.getElementById('multi-panel').classList.add('hidden');
            updateBtn();
            loadFriends();
        }

        function showMulti() {
            currentMode = 'multi';
            document.getElementById('pair-panel').classList.add('hidden');
            document.getElementById('multi-panel').classList.remove('hidden');
            updateBtn();
        }

        function showRoutes() {
            if (window.AndroidBridge) AndroidBridge.showRouteManager();
        }

        function showProfile() {
            if (window.AndroidBridge) AndroidBridge.showProfile();
        }

        function generateCode() {
            if (window.AndroidBridge) AndroidBridge.generatePairCode('');
        }

        window.onPairCode = function(code) {
            document.getElementById('code').textContent = code;
            document.getElementById('code-display').classList.remove('hidden');
        };

        function showPairDialog() {
            const code = prompt('输入6位配对码');
            if (code && code.length === 6 && window.AndroidBridge) {
                AndroidBridge.pairWithCode(code, '');
            }
        }

        function loadFriends() {
            if (window.AndroidBridge) AndroidBridge.loadFriends();
        }

        window.onFriends = function(json) {
            const friends = JSON.parse(json);
            const list = document.getElementById('friends-list');
            if (friends.length === 0) {
                list.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">暂无好友，点击"生成配对码"添加</div>';
            } else {
                list.innerHTML = friends.map(f => `
                    <div class="friend-item ${selectedFriend?.friendId === f.friendId ? 'friend-selected' : ''}" onclick="selectFriend('${f.friendId}', '${f.pairRoomId}', '${f.friendName}')">
                        <div class="friend-avatar">${f.friendName.charAt(0)}</div>
                        <div>
                            <div class="friend-name">${f.friendName}</div>
                            <div class="friend-status">点击开始共享</div>
                        </div>
                    </div>
                `).join('');
            }
        };

        function selectFriend(id, roomId, name) {
            selectedFriend = { friendId: id, pairRoomId: roomId, friendName: name };
            // 更新选中样式
            document.querySelectorAll('.friend-item').forEach(el => {
                el.classList.remove('friend-selected');
            });
            event.currentTarget.classList.add('friend-selected');
            updateBtn();
        }

        function toggleShare() {
            if (isSharing) {
                if (window.AndroidBridge) AndroidBridge.stopSharing();
            } else {
                const name = document.getElementById('user-name')?.value || '';
                if (currentMode === 'pair' && selectedFriend) {
                    if (window.AndroidBridge) AndroidBridge.startPairSharing(name, selectedFriend.pairRoomId);
                } else if (currentMode === 'multi') {
                    const roomId = document.getElementById('room-id').value;
                    if (roomId && window.AndroidBridge) AndroidBridge.startMultiSharing(name, roomId);
                }
            }
        }

        function updateBtn() {
            const btn = document.getElementById('share-btn');
            btn.textContent = isSharing ? '停止共享' : '开始共享';
            btn.style.background = isSharing ? '#FF6B6B' : '';

            let canStart = false;
            if (currentMode === 'pair' && selectedFriend) canStart = true;
            if (currentMode === 'multi' && document.getElementById('room-id')?.value && document.getElementById('user-name')?.value) canStart = true;

            btn.disabled = !isSharing && !canStart;
        }

        window.onShareState = function(sharing) {
            isSharing = sharing;
            updateBtn();
        };

        window.onUserJoin = function(name) {
            // 可以显示toast提示
        };

        window.onNewFriend = function(name) {
            loadFriends();
        };

        // 地图标记点击 - 显示信息窗口
        window.onMarkerClicked = function(id, name, speed, bearing) {
            document.getElementById('info-avatar').textContent = name.charAt(0);
            document.getElementById('info-name').textContent = name;

            // 速度 (m/s 转换为 km/h)
            const speedKmh = Math.round(speed * 3.6);
            document.getElementById('info-speed').textContent = speedKmh;

            // 方向
            const directions = ['北', '东北', '东', '东南', '南', '西南', '西', '西北'];
            const index = Math.round(bearing / 45) % 8;
            document.getElementById('info-bearing').textContent = directions[index] || '北';

            document.getElementById('info-backdrop').classList.add('show');
            document.getElementById('map-info-window').classList.add('show');
        };

        function closeInfoWindow() {
            document.getElementById('info-backdrop').classList.remove('show');
            document.getElementById('map-info-window').classList.remove('show');
        }

        // 接收位置更新并更新房间用户列表
        window.onLocationUpdate = function(userId, lat, lng, name, speed, bearing) {
            // 保存用户位置信息
            roomUsers.set(userId, {
                userId: userId,
                name: name,
                lat: lat,
                lng: lng,
                speed: speed || 0,
                bearing: bearing || 0
            });

            // 如果当前在多人模式，更新用户列表显示
            if (currentMode === 'multi' && isSharing) {
                updateRoomUsersList();
            }
        };

        // 更新房间用户列表UI
        function updateRoomUsersList() {
            const container = document.getElementById('room-users-container');
            const listWrapper = document.getElementById('room-users-list');

            if (roomUsers.size === 0) {
                listWrapper.classList.add('hidden');
                return;
            }

            listWrapper.classList.remove('hidden');
            const myUserId = ''; // 自己的ID会在原生端过滤掉或标记

            let html = '';
            roomUsers.forEach((user, uid) => {
                const isSelf = uid === 'self' || uid === ''; // 简单判断，实际需要用户ID
                html += `
                    <div class="room-user-item" onclick="onRoomUserClick('${uid}')">
                        <div class="room-user-avatar">${user.name.charAt(0)}</div>
                        <div class="room-user-name">${user.name}</div>
                        ${isSelf ? '<span class="room-user-self">我</span>' : ''}
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // 点击房间用户
        function onRoomUserClick(userId) {
            const user = roomUsers.get(userId);
            if (!user) return;

            // 移动地图到该用户位置
            if (window.AndroidBridge) {
                AndroidBridge.moveToLocation(user.lat, user.lng);
            }

            // 显示信息窗口
            document.getElementById('info-avatar').textContent = user.name.charAt(0);
            document.getElementById('info-name').textContent = user.name;

            const speedKmh = Math.round(user.speed * 3.6);
            document.getElementById('info-speed').textContent = speedKmh;

            const directions = ['北', '东北', '东', '东南', '南', '西南', '西', '西北'];
            const index = Math.round(user.bearing / 45) % 8;
            document.getElementById('info-bearing').textContent = directions[index] || '北';

            document.getElementById('info-backdrop').classList.add('show');
            document.getElementById('map-info-window').classList.add('show');
        }

        // 用户离开房间
        window.onUserLeave = function(userId) {
            roomUsers.delete(userId);
            if (currentMode === 'multi' && isSharing) {
                updateRoomUsersList();
            }
        };
    </script>
</body>
</html>
